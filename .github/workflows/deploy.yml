name: Deploy to Amazon EC2 (Secure)

on:
  push:
    branches: [ "master" ]

env:
  AWS_REGION: ap-northeast-2 # 서울 리전

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 코드 가져오기
      uses: actions/checkout@v3

    - name: 2. 자바(JDK) 세팅하기
      uses: actions/setup-java@v3
      with:
        java-version: '17' # 진용님 자바 버전
        distribution: 'temurin'

    - name: 3. 스프링 프로젝트 빌드
      run: |
        chmod +x ./gradlew
        ./gradlew clean build -x test

    - name: 4. 도커 허브 로그인
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 5. 도커 이미지 빌드 및 허브에 올리기
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/maple-server:latest

    - name: 6. 깃허브 액션 실행 서버의 임시 IP 확인하기
      id: ip
      run: echo "ipv4=$(curl -s http://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

    - name: 7. AWS 인증하기 (신분증 제시)
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 8. [문 열기] AWS 보안 그룹 22번 포트 임시 개방
      run: |
        aws ec2 authorize-security-group-ingress \
          --group-id ${{ secrets.AWS_SG_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32

    - name: 9. EC2에 SSH 접속해서 새 버전 배포하기
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/maple-server:latest
          sudo docker stop maple || true
          sudo docker rm maple || true
          sudo docker run -d --name maple -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -v /home/ubuntu/maple/images:/images \
            ${{ secrets.DOCKER_USERNAME }}/maple-server:latest

    - name: 10. [문 닫기] AWS 보안 그룹 22번 포트 차단 복구
      if: always() # 배포가 성공하든 실패하든 문은 무조건 닫음!
      run: |
        aws ec2 revoke-security-group-ingress \
          --group-id ${{ secrets.AWS_SG_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32
