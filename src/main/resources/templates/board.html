<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 게시판</title>
    <!-- 카카오 SDK v1 (팝업 지원) & 공용 로그인 스크립트 -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/1.43.0/kakao.min.js"></script>
    <script src="/js/auth.js"></script>
    
    <style>
        body {
            background-color: #222;
            color: #eee;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0;
            padding-top: 80px; 
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding: 20px; background: #333;
            border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        h2 { margin: 0; color: #ffcc00; }

        .btn {
            background: #ffcc00; color: #222; border: none; padding: 8px 15px;
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover { background: #eebb00; }
        .btn-danger { background: #e94560; color: #fff; } .btn-danger:hover { background: #d33c56; }
        .btn-secondary { background: #555; color: #fff; } .btn-secondary:hover { background: #444; }

        .board-container {
            background: #333; border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #444; }
        th { color: #ffcc00; font-weight: bold; font-size: 14px; background: #2a2a2a; border-top: 2px solid #555; }
        td { font-size: 14px; color: #ddd; }
        
        /* 제목 클릭 시 효과 */
        .title-link { color: #ffcc00; font-weight: bold; cursor: pointer; text-decoration: none; }
        .title-link:hover { text-decoration: underline; }

        tr:hover { background-color: rgba(255, 204, 0, 0.05); }

        /* 모달 스타일 */
        .form-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; padding: 20px;
            z-index: 2000; 
        }
        .form-modal.active { display: flex; }
        .form-content {
            background: #333; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px;
            border: 1px solid #555; box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }
        
        .form-content label { display: block; margin-bottom: 5px; color: #aaa; font-size: 13px; }
        .form-content input, .form-content textarea {
            width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #555;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
            background: #444; color: #fff;
        }
        .form-content textarea { resize: vertical; min-height: 120px; font-family: inherit; }
        .actions { display: flex; gap: 10px; justify-content: flex-end; }
        
        /* 페이지네이션 버튼 */
        .page-btn {
            background: #444; color: #eee; border: 1px solid #555; padding: 5px 10px;
            margin: 0 3px; cursor: pointer; border-radius: 4px; font-size: 13px;
        }
        .page-btn:hover { background: #555; }
        .page-btn.active { background: #ffcc00; color: #222; border-color: #ffcc00; font-weight: bold; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
</head>
<body>

    <!-- 상단 네비게이션 바 -->
    <nav style="position: absolute; top: 0; left: 0; width: 100%; padding: 15px 30px; background: #2a2a2a; border-bottom: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 1000;">
        <div style="display: flex; gap: 30px; align-items: center;">
            <a href="/calculator" style="color: #eee; text-decoration: none; font-weight: bold; font-size: 16px;">모의 계산기</a>
            <a href="/board" style="color: #ffcc00; text-decoration: none; font-weight: bold; font-size: 18px;">🍁 커뮤니티</a>
        </div>
        <!-- 우측 인증 UI 영역 -->
        <div id="authArea"></div>
    </nav>

<div class="container">
    <header>
        <h2>유저 커뮤니티 게시판</h2>
        <div style="font-size: 14px;">자유롭게 정보와 의견을 나눠보세요!</div>
    </header>

    <div class="board-container">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #555; padding-bottom: 15px;">
            <h3 style="margin: 0; color: #fff;">최근 게시글</h3>
            <button class="btn" id="writeBtn" onclick="openForm()" style="display: none; padding: 10px 18px; font-size: 14px;">글 작성하기</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="8%">번호</th>
                    <th width="47%">제목</th>
                    <th width="20%">작성자</th>
                    <th width="15%">작성일</th>
                    <th width="10%" style="text-align: center;">조회</th>
                </tr>
            </thead>
            <tbody id="boardBody">
                 <tr><td colspan="5" style="text-align:center;">게시글을 불러오는 중입니다...</td></tr>
            </tbody>
        </table>

        <!-- 10개씩 페이징을 표시할 영역 -->
        <div id="pagination" style="text-align: center; margin-top: 25px;"></div>
    </div>
</div>

<!-- ========================= 모달 영역 시작 ========================= -->

<!-- 1. 게시글 (작성 / 수정) 모달 -->
<div class="form-modal" id="boardModal">
    <div class="form-content">
        <h3 id="modalTitle" style="color: #ffcc00; margin-top: 0;">게시글 작성</h3>
        <input type="hidden" id="boardId">
        
        <label for="titleInput">제목</label>
        <input type="text" id="titleInput" placeholder="제목을 입력하세요">
        
        <label for="contentInput">내용</label>
        <textarea id="contentInput" placeholder="내용을 입력하세요"></textarea>
        
        <div class="actions">
            <button class="btn btn-secondary" onclick="closeForm()">취소</button>
            <button class="btn" onclick="saveBoard()" style="padding: 8px 20px;">저장</button>
        </div>
    </div>
</div>

<!-- 2. 게시글 상세조회 모달 (읽기 전용) -->
<div class="form-modal" id="viewModal">
    <div class="form-content" style="max-width: 600px;">
        <h3 id="viewTitle" style="color: #ffcc00; margin-top: 0; margin-bottom: 5px; word-break: break-all;"></h3>
        <!-- 작성자, 날짜 표시바 -->
        <div style="font-size: 13px; color: #aaa; margin-bottom: 20px; border-bottom: 1px solid #555; padding-bottom: 10px;">
            작성자: <span id="viewAuthor" style="color: #ddd; font-weight: bold; margin-right: 15px;"></span> 
            작성일: <span id="viewDate"></span>
        </div>
        
        <!-- 내용 본문 -->
        <div id="viewContent" style="color: #eee; min-height: 120px; white-space: pre-wrap; margin-bottom: 25px; line-height: 1.6; font-size: 15px;"></div>
        
        <div class="actions" id="viewActions">
            <!-- 권한(본인or기본)에 따라 아래 버튼들이 이 영역에 동적으로 주입됩니다 -->
            <button class="btn btn-secondary" onclick="closeViewModal()">닫기</button>
        </div>
    </div>
</div>

<!-- ========================= 모달 영역 끝 ========================= -->

<script>
    let currentPage = 0; // 전역 페이지 인덱스 상태 저장

    window.addEventListener('DOMContentLoaded', () => {
        loadBoards(0);
        if(currentUser.token) {
            document.getElementById('writeBtn').style.display = 'inline-block';
        }
    });

    // 게시판 목록 불러오기 (인증 필요 X) - 페이징 파라미터 적용
    async function loadBoards(page = 0) {
        currentPage = page; // 상태 업데이트
        try {
            const res = await fetch(`/api/board?page=${page}`);
            const data = await res.json(); 
            // Spring Page<T> 객체라서 data.content 내부에 배열이 존재합니다.
            
            const tbody = document.getElementById('boardBody');
            tbody.innerHTML = '';
            
            if (!data.content || data.content.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">아직 작성된 글이 없습니다.</td></tr>';
                document.getElementById('pagination').innerHTML = ''; // 페이징 영역 클리어
                return;
            }

            data.content.forEach(board => {
                const tr = document.createElement('tr');
                
                const dateObj = new Date(board.createdAt);
                const dateStr = `${dateObj.getMonth()+1}.${dateObj.getDate()} ${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                
                tr.innerHTML = `
                    <td>${board.id}</td>
                    <td><a class="title-link" onclick="openViewModal(${board.id})">${board.title}</a></td>
                    <td>${board.authorNickname}</td>
                    <td style="color:#aaa; font-size:13px;">${dateStr}</td>
                    <td style="text-align: center;">
                        <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 11px;" onclick="openViewModal(${board.id})">상세🔎</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            // UI 업데이트
            if (currentUser.token) {
                document.getElementById('writeBtn').style.display = 'inline-block';
            } else {
                document.getElementById('writeBtn').style.display = 'none';
            }

            // 하단 페이징 렌더링 호출
            renderPagination(data);

        } catch(e) {
            console.error(e);
            document.getElementById('boardBody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:#e94560;">오류가 발생했습니다.</td></tr>';
        }
    }

    // 하단 1, 2, 3 페이징 네비게이터 렌더링
    function renderPagination(pageData) {
        const pbox = document.getElementById('pagination');
        pbox.innerHTML = '';
        
        const totalPages = pageData.totalPages;
        const current = pageData.number;

        // 이전 버튼
        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn';
        prevBtn.innerText = '이전';
        prevBtn.disabled = pageData.first; 
        if(!pageData.first) prevBtn.onclick = () => loadBoards(current - 1);
        pbox.appendChild(prevBtn);

        // 페이지 번호들 (최대 10개만 보여주는 등의 수학적 계산도 가능하지만 심플하게 모두 뿌림)
        for (let i = 0; i < totalPages; i++) {
            const numBtn = document.createElement('button');
            numBtn.className = 'page-btn';
            if (i === current) numBtn.classList.add('active');
            numBtn.innerText = (i + 1);
            numBtn.onclick = () => loadBoards(i);
            pbox.appendChild(numBtn);
        }

        // 다음 버튼
        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn';
        nextBtn.innerText = '다음';
        nextBtn.disabled = pageData.last;
        if(!pageData.last) nextBtn.onclick = () => loadBoards(current + 1);
        pbox.appendChild(nextBtn);
    }

    /* ==== 상세조회 (Read) 기능 ==== */

    async function openViewModal(id) {
        try {
            const res = await fetch(`/api/board/${id}`);
            if(!res.ok) {
                 alert('존재하지 않거나 삭제된 게시글입니다.');
                 return;
            }
            const board = await res.json();

            // 데이터 바인딩
            document.getElementById('viewTitle').innerText = board.title;
            document.getElementById('viewAuthor').innerText = board.authorNickname;
            const d = new Date(board.createdAt);
            document.getElementById('viewDate').innerText = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            document.getElementById('viewContent').innerText = board.content; // XSS 방어(innerText) + 개행(pre-wrap css)

            const actionsBox = document.getElementById('viewActions');
            // 기본 닫기 버튼
            actionsBox.innerHTML = `<button class="btn btn-secondary" onclick="closeViewModal()">닫기</button>`;

            // 권한 체크: 나 자신이 쓴 글이거나, 내가 어드민인 경우 수정/삭제 버튼 추가 노출
            const isAdmin = currentUser.role === 'ROLE_ADMIN';
            const isMine = currentUser.nickname === board.authorNickname;

            if (currentUser.token && (isAdmin || isMine)) {
                
                // 삭제 버튼 추가
                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-danger';
                delBtn.innerText = '삭제';
                delBtn.onclick = () => deleteBoard(board.id);
                actionsBox.prepend(delBtn);

                // 수정 버튼 추가
                const editBtn = document.createElement('button');
                editBtn.className = 'btn';
                editBtn.innerText = '수정';
                editBtn.onclick = () => {
                    closeViewModal();
                    // content 내의 이스케이프 안전 처리를 위해 직렬화된 데이터 사용을 권장하지만 
                    // 위 스코프의 board 객체가 살아있으므로 그대로 넘김
                    editFormWithObj(board);
                };
                actionsBox.prepend(editBtn);
            }

            document.getElementById('viewModal').classList.add('active');
        } catch(e) { console.error(e); }
    }

    function closeViewModal() {
        document.getElementById('viewModal').classList.remove('active');
    }

    /* ==== 게시글 작성/수정/삭제 (인증 필요 O) ==== */

    function openForm() {
        document.getElementById('boardModal').classList.add('active');
        document.getElementById('modalTitle').innerText = '게시글 작성';
        document.getElementById('boardId').value = '';
        document.getElementById('titleInput').value = '';
        document.getElementById('contentInput').value = '';
    }

    // 상세모달에서 `수정`을 눌렀을 때 넘어오는 데이터 기반 작성폼
    function editFormWithObj(board) {
        openForm();
        document.getElementById('modalTitle').innerText = '게시글 수정';
        document.getElementById('boardId').value = board.id;
        document.getElementById('titleInput').value = board.title;
        document.getElementById('contentInput').value = board.content;
    }

    function closeForm() {
        document.getElementById('boardModal').classList.remove('active');
    }

    async function saveBoard() {
        if (!currentUser.token) {
            alert("로그인이 필요합니다.");
            return;
        }

        const id = document.getElementById('boardId').value;
        const title = document.getElementById('titleInput').value;
        const content = document.getElementById('contentInput').value;

        if(!title || !content) { alert('제목과 내용을 입력해주세요.'); return; }

        const url = id ? `/api/board/${id}` : `/api/board`;
        const method = id ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method: method,
                headers: getAuthHeaders(), // auth.js 정의됨
                body: JSON.stringify({ title, content })
            });

            if (res.ok) {
                closeForm();
                // 글 작성 시 첫페이지로 이동, 수정 시엔 현재페이지 유지
                if(id) loadBoards(currentPage); 
                else loadBoards(0); 
            } else {
                alert('권한이 없거나 서버 에러발생.');
            }
        } catch(e) { console.error(e); }
    }

    async function deleteBoard(id) {
        if (!confirm('정말로 이 글을 삭제하시겠습니까?')) return;
        
        try {
            const res = await fetch(`/api/board/${id}`, {
                method: 'DELETE',
                headers: getAuthHeaders()
            });

            if (res.ok) {
                closeViewModal(); 
                loadBoards(currentPage); // 삭제 후에도 현재 페이지 유지
            } else {
                alert('권한이 없거나 삭제할 수 없습니다.');
            }
        } catch(e) { console.error(e); }
    }
</script>

</body>
</html>
