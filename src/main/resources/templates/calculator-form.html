<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Maple Spec Calculator</title>
    <style>
        body {
            background-color: #222;
            color: #eee;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #333;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #ffcc00;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #444;
            color: #fff;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background: #ffcc00;
            /* 메이플 대표 색상 느낌 */
            color: #222;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #eebb00;
        }
    </style>
    <!-- 카카오 SDK & 로그인 공용스크립트 -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/1.43.0/kakao.min.js"></script>
    <script src="/js/auth.js"></script>
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <nav style="position: absolute; top: 0; left: 0; width: 100%; padding: 15px 30px; background: #2a2a2a; border-bottom: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 1000;">
        <div style="display: flex; gap: 30px; align-items: center;">
            <a href="/calculator" style="color: #ffcc00; text-decoration: none; font-weight: bold; font-size: 18px;">🍁 시뮬레이터</a>
            <a href="/board" style="color: #eee; text-decoration: none; font-weight: bold; font-size: 16px;">커뮤니티 게시판</a>
        </div>
        <!-- 우측 인증 UI 영역 -->
        <div id="authArea"></div>
    </nav>

    <div class="container">
        <h2>🍁 스펙 업그레이드 계산기</h2>

        <div class="info-box"
            style="background: rgba(42, 42, 42, 0.8); border: 1px solid #ffcc00; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; color: #ddd; text-align: left; line-height: 1.5; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #fff;">💡 처음 오셨나요?</div>
            시뮬레이션 체험을 원하시면 버튼을 클릭하세요!
            <button type="button" onclick="fillExample()"
                style="margin-top: 10px; padding: 8px; font-size: 13px; background: rgba(255, 204, 0, 0.1); border: 1px dashed #ffcc00; color: #ffcc00; cursor: pointer; border-radius: 4px;">
                ✨ 자동 입력 (규화설 / 20000 → 70000)
            </button>
        </div>

        <div th:if="${errorMessage}" style="color: #ff6b6b; margin-bottom: 15px; font-weight: bold;">
            ⚠️ <span th:text="${errorMessage}">오류 메시지</span>
        </div>
        <form action="/calculator/result" method="post">
            <div class="form-group">
                <label for="name">캐릭터 닉네임</label>
                <input type="text" id="name" name="name" placeholder="닉네임을 입력하세요" required>
            </div>
            <div class="form-group">
                <label for="currentScore">현재 환산 점수</label>
                <input type="number" id="currentScore" name="currentScore" placeholder="예: 50000" required>
            </div>
            <div class="form-group">
                <label for="targetScore">목표 환산 점수</label>
                <input type="number" id="targetScore" name="targetScore" placeholder="예: 60000" required>
            </div>
            <button type="submit">계산 시작</button>
        </form>
    </div>

    <script>
        function fillExample() {
            document.getElementById('name').value = '규화설';
            document.getElementById('currentScore').value = '20000';
            document.getElementById('targetScore').value = '70000';
        }
    </script>
</body>

</html>
